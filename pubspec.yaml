name: fieldpilot
description: Offline-first CRM for medical field sales representatives.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  cloud_firestore: ">=5.6.0 <7.0.0"
  connectivity_plus: ">=6.1.0 <8.0.0"
  cupertino_icons: ^1.0.8
  firebase_auth: ">=5.5.0 <7.0.0"
  firebase_core: ">=3.13.0 <5.0.0"
  firebase_messaging: ">=15.2.0 <17.0.0"
  firebase_storage: ">=12.4.0 <14.0.0"
  file_picker: ">=8.1.0 <11.0.0"
  flutter_local_notifications: ">=18.0.0 <20.0.0"
  flutter_riverpod: ">=2.6.0 <4.0.0"
  go_router: ">=14.8.0 <18.0.0"
  google_fonts: ">=6.2.0 <8.0.0"
  google_maps_flutter: ">=2.10.0 <4.0.0"
  google_mlkit_text_recognition: ">=0.14.0 <2.0.0"
  image_picker: ">=1.1.0 <3.0.0"
  intl: ">=0.19.0 <0.21.0"
  isar: ">=3.1.0 <4.0.0"
  isar_flutter_libs: ">=3.1.0 <4.0.0"
  json_annotation: ">=4.9.0 <6.0.0"
  local_auth: ">=2.3.0 <4.0.0"
  path_provider: ">=2.1.0 <4.0.0"
  pdf: ">=3.11.0 <5.0.0"
  printing: ">=5.13.0 <7.0.0"
  supabase_flutter: ">=2.8.0 <4.0.0"
  uuid: ">=4.5.0 <6.0.0"

dev_dependencies:
  build_runner: ">=2.4.0 <4.0.0"
  flutter_lints: ">=5.0.0 <7.0.0"
  flutter_test:
    sdk: flutter
  freezed: ">=2.5.0 <4.0.0"
  isar_generator: ">=3.1.0 <4.0.0"
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
